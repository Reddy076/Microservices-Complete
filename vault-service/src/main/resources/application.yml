server:
  port: 8082

spring:
  application:
    name: vault-service
  config:
    import: "optional:configserver:http://localhost:8888/"
  datasource:
    url: jdbc:mysql://localhost:3306/vault_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.revature.vault: DEBUG
    org.springframework.security: INFO

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

encryption:
  algorithm: AES/GCM/NoPadding
  key-length: 256
  salt-length: 16
  gcm-iv-length: 12
  gcm-tag-length: 128
  iterations: 600000
