server:
  port: 8086

spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:rev_password_manager}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

llm:
  provider: ${LLM_PROVIDER:OPENAI}
  base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
  api-key: ${OPENAI_API_KEY:}
  model: ${LLM_MODEL:llama-3.1-70b-versatile}
  temperature: 0.7
  timeout-seconds: 60
  max-tokens: 2048
  stream-enabled: false
  max-retries: 3

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
